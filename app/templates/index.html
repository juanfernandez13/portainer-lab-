<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ app_name }}</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1f3a5f, #0b1220 60%);
      color: #e6edf3;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      padding: 2.5rem 3rem;
      border-radius: 18px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.4rem; font-weight: 500; opacity: 0.85; }
    .count {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #a371f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0.5rem 0;
    }
    .meta { font-size: 0.85rem; opacity: 0.6; margin-top: 1rem; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>{{ app_name }}</h1>
    <div class="count">{{ count }}</div>
    <div>visita(s) registrada(s)</div>
    <div class="meta">
      servido por <code>{{ hostname }}</code><br/>
      recarregue para incrementar
    </div>
  </main>
</body>
</html>
